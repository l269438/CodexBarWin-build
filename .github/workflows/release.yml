name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos:
    name: macOS arm64
    runs-on: macos-14
    env:
      MACOS_TARGET: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.MACOS_TARGET }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build macOS app
        run: pnpm tauri build --target ${{ env.MACOS_TARGET }}

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: CodexPilot-macos-arm64
          path: |
            src-tauri/target/${{ env.MACOS_TARGET }}/release/bundle/**/*.dmg
            src-tauri/target/${{ env.MACOS_TARGET }}/release/bundle/**/*.app.tar.gz
          if-no-files-found: error

  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Windows app
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: CodexPilot-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows

    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: CodexPilot-*
          merge-multiple: true

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          mapfile -d '' files < <(find release-artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.zip" -o -name "*.app.tar.gz" \) -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            find release-artifacts -type f -print
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --target "$RELEASE_TARGET" \
              --title "CodexPilot $RELEASE_TAG" \
              --notes "CodexPilot desktop release for macOS and Windows."
          fi
